<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Junk Food Blur App</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; transition: filter 0.5s ease; }
        #overlay { position: absolute; top: 40px; width: 90%; left: 5%; text-align: center; color: white; font-family: sans-serif; z-index: 10; font-weight: bold; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>
    <div id="overlay">Initializing camera...</div>
    <video id="webcam" autoplay playsinline></video>
    <script src="main.js"></script>
</body>
</html>
